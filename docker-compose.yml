version: "3"

services:
  gateway:
    hostname: gateway
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - library
      - rating
      - reservation
    environment:
      - LIB_SERVICE_URL=library:50051
      - RATING_SERVICE_URL=rating:50053
      - RESERVATION_SERVICE_URL=reservation:50052

  library:
    hostname: library
    build:
      context: ./services/library
      dockerfile: Dockerfile
    ports:
      - "50051:50051"

  reservation:
    hostname: reservation
    build:
      context: ./services/reservation
      dockerfile: Dockerfile
    ports:
      - "50052:50052"

  rating:
    hostname: rating
    build:
      context: ./services/rating
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
